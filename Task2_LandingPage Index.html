<!DOCTYPE html>
<html>
<head>

<style>

body{
margin:0;

nav{

padding:15px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{

}

text-align:center;

header h1{

header p{

button{

color:#6c4ab6;
border:none;
padding:12px 25px;
font-size:16px;

}

button:hover{

}

.features{

padding:20px;

.card:hover{
transform:scale(1.05);

/* FOOTER */
footer{

color:white;
text-align:center;
padding:15px;
