<!DOCTYPE html>
<html>
<head>
<title>Perfect Calculator</title>

<style>
body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: linear-gradient(135deg, #1d2671, #c33764);
}

/* GRID LAYOUT */
.calculator{
    background: #0f172a;
    padding:20px;
    border-radius:20px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.6);

    display:grid;
    grid-template-columns: repeat(4, 70px);
    gap:12px;
}

/* DISPLAY FIXED 🔥 */
#display{
    grid-column: span 4;
    height:60px;
    font-size:28px;
    text-align:right;

    border:none;
    border-radius:12px;

    padding:0 15px;
    margin:0;

    background:#020617;
    color:#00f5d4;

    display:flex;
    align-items:center;
    justify-content:flex-end;

    box-sizing:border-box;
}

#display:focus{
    outline:none;
}

/* BUTTONS */
button{
    height:55px;
    font-size:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    transition:0.2s;
}

/* COLORS */
.number{ background:#3a0ca3; }
.operator{ background:#f72585; }
.equal{ background:#06d6a0; grid-column: span 2; }
.clear{ background:#ef233c; }
.back{ background:#ffbe0b; color:black; }

/* HOVER EFFECT */
button:hover{
    transform: scale(1.08);
    box-shadow: 0 0 10px rgba(255,255,255,0.4);
}
</style>

</head>

<body>

<div class="calculator">

<input type="text" id="display" readonly>

<button class="clear" onclick="clearDisplay()">C</button>
<button class="back" onclick="backspace()">⌫</button>
<button class="operator" onclick="press('/')">÷</button>
<button class="operator" onclick="press('*')">×</button>

<button class="number" onclick="press('7')">7</button>
<button class="number" onclick="press('8')">8</button>
<button class="number" onclick="press('9')">9</button>
<button class="operator" onclick="press('-')">−</button>

<button class="number" onclick="press('4')">4</button>
<button class="number" onclick="press('5')">5</button>
<button class="number" onclick="press('6')">6</button>
<button class="operator" onclick="press('+')">+</button>

<button class="number" onclick="press('1')">1</button>
<button class="number" onclick="press('2')">2</button>
<button class="number" onclick="press('3')">3</button>
<button class="number" onclick="press('.')">.</button>

<button class="number" onclick="press('0')">0</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<script>
function press(value){
    document.getElementById("display").value += value;
}

function calculate(){
    try{
        let exp = document.getElementById("display").value;
        let result = Function('"use strict";return (' + exp + ')')();
        document.getElementById("display").value = result;
    } catch{
        document.getElementById("display").value = "Error";
    }
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function backspace(){
    let display = document.getElementById("display");
    display.value = display.value.slice(0, -1);
}

/* KEYBOARD SUPPORT */
document.addEventListener("keydown", function(e){
    if(!isNaN(e.key) || "+-*/.".includes(e.key)){
        press(e.key);
    }
    else if(e.key === "Enter"){
        calculate();
    }
    else if(e.key === "Backspace"){
        backspace();
    }
    else if(e.key === "Escape"){
        clearDisplay();
    }
});
</script>

</body>
</html>
